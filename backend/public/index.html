<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Clínico — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <h1>🏥 ClinicaSys</h1>
        <p>Sistema de Gestión Clínica</p>
      </div>

      <div id="loginAlert" class="alert alert-error"></div>

      <form id="loginForm">
        <div class="form-group mb-4">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username" />
        </div>
        <div class="form-group mb-4" style="margin-top:16px">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:24px">
          Iniciar sesión
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('loginAlert');
      alert.classList.remove('show');
      const btn = e.target.querySelector('button');
      btn.textContent = 'Ingresando...';
      btn.disabled = true;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });

      if (res.ok) {
        window.location.href = '/app.html';
      } else {
        const data = await res.json();
        alert.textContent = data.error || 'Error al iniciar sesión';
        alert.classList.add('show');
        btn.textContent = 'Iniciar sesión';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
