version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: clinica_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Clinica123!}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db/clinica.sql:/docker-entrypoint-initdb.d/clinica.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_user -d clinica"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://clinica_user:${DB_PASSWORD:-Clinica123!}@postgres:5432/clinica
      SESSION_SECRET: ${SESSION_SECRET:-clinica-secret-2026}
    restart: unless-stopped

volumes:
  pg_data:
